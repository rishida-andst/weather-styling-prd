<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタイル分析 精度検証ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* ローディング用スピナーのアニメーション */
        .spinner {
            border: 4px solid rgba(226, 232, 240, 1);
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-gray-800 relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useMemo } = React;

        const WEATHER_MAP = {
            "0": { label: "対象外", emoji: "➖", color: "bg-gray-100 text-gray-600 border-gray-300" },
            "1": { label: "晴", emoji: "☀️", color: "bg-orange-50 text-orange-600 border-orange-200" },
            "2": { label: "雨", emoji: "☂️", color: "bg-blue-50 text-blue-600 border-blue-200" },
            "3": { label: "曇", emoji: "☁️", color: "bg-slate-100 text-slate-600 border-slate-300" },
            "4": { label: "雪", emoji: "⛄️", color: "bg-sky-50 text-sky-600 border-sky-200" }
        };

        const parseCSV = (text) => {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        currentCell += '"';
                        i++; 
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currentCell !== '' || currentRow.length > 0) {
                        currentRow.push(currentCell.trim());
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentCell = '';
                    if (char === '\r' && text[i + 1] === '\n') i++; 
                } else {
                    currentCell += char;
                }
            }
            if (currentCell !== '' || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }
            return rows;
        };

        const cleanId = (rawId) => {
            if (!rawId) return "";
            return rawId.replace(/["']/g, "").replace(/styling_/g, "").trim();
        };

        function App() {
            const [stylingData, setStylingData] = useState({});
            const [isDragging, setIsDragging] = useState(false);
            const [isLoading, setIsLoading] = useState(false); // ★ローディング状態の管理を追加
            const [loadedFiles, setLoadedFiles] = useState([]);
            const [filterWeather, setFilterWeather] = useState('ALL'); 
            const [sortType, setSortType] = useState('id_asc'); 

            const handleDrop = useCallback(async (e) => {
                e.preventDefault();
                setIsDragging(false);
                
                const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.csv'));
                if (files.length === 0) return alert('CSVファイルをドロップしてください。');

                // ★ローディングUIを即座に表示させる
                setIsLoading(true);

                // Reactの画面描画（スピナー表示）を優先させるため、重い処理を少しだけ遅らせる
                setTimeout(async () => {
                    try {
                        setLoadedFiles(prev => [...new Set([...prev, ...files.map(f => f.name)])]);
                        const newData = { ...stylingData };

                        for (const file of files) {
                            const text = await file.text();
                            const rows = parseCSV(text);
                            if (rows.length < 2) continue; 

                            const header = rows[0].map(h => h.replace(/["']/g, "").trim().toLowerCase());
                            const idIndex = header.findIndex(h => h.includes('item_id') || h.includes('styling_id'));
                            if (idIndex === -1) continue;

                            for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (row.length === 0 || !row[idIndex]) continue;
                                
                                const itemId = cleanId(row[idIndex]);
                                if (!itemId) continue;

                                if (!newData[itemId]) newData[itemId] = { id: itemId, weather_types: [] };

                                header.forEach((colName, colIdx) => {
                                    if (colIdx === idIndex) return;
                                    const val = row[colIdx] ? row[colIdx].replace(/["']/g, "").trim() : "";
                                    if (!val) return;

                                    if (colName.includes('max_temperature') || colName.includes('max_temp')) newData[itemId].max_temp = val;
                                    if (colName.includes('min_temperature') || colName.includes('min_temp')) newData[itemId].min_temp = val;
                                    if (colName.includes('weather_type') || colName.includes('weather_code')) {
                                        if (!newData[itemId].weather_types.includes(val)) {
                                            newData[itemId].weather_types.push(val);
                                        }
                                    }
                                    if (colName.includes('weather_comment') || colName.includes('styling_comment') || colName.includes('style_comment')) {
                                        newData[itemId].comment = val;
                                    }
                                    
                                    if (colName.includes('image') || colName.includes('thumb')) newData[itemId].image_url = val;
                                    if (colName.includes('category')) newData[itemId].category = val;
                                    if (colName.includes('item_nm') || colName.includes('item_name') || colName.includes('item')) newData[itemId].items = val;
                                });
                            }
                        }
                        setStylingData(newData);
                    } catch (error) {
                        console.error("エラーが発生しました:", error);
                        alert("ファイルの読み込み中にエラーが発生しました。");
                    } finally {
                        // ★処理が終わったらローディング画面を消す
                        setIsLoading(false);
                    }
                }, 50); // 50ミリ秒遅延させてUIレンダリングの隙間を作る
            }, [stylingData]);

            const processedData = useMemo(() => {
                let data = Object.values(stylingData);

                if (filterWeather !== 'ALL') {
                    data = data.filter(item => {
                        if (filterWeather === '0') {
                            return !item.weather_types || item.weather_types.length === 0 || item.weather_types.includes('0');
                        }
                        return item.weather_types && item.weather_types.includes(filterWeather);
                    });
                }

                data.sort((a, b) => {
                    const idA = parseInt(a.id) || 0;
                    const idB = parseInt(b.id) || 0;
                    const tempA = a.max_temp !== undefined && a.max_temp !== '' ? parseFloat(a.max_temp) : null;
                    const tempB = b.max_temp !== undefined && b.max_temp !== '' ? parseFloat(b.max_temp) : null;

                    switch (sortType) {
                        case 'id_asc': return idA - idB;
                        case 'id_desc': return idB - idA;
                        case 'temp_desc': 
                            if (tempA === null) return 1;
                            if (tempB === null) return -1;
                            return tempB - tempA;
                        case 'temp_asc': 
                            if (tempA === null) return 1;
                            if (tempB === null) return -1;
                            return tempA - tempB;
                        default: return 0;
                    }
                });

                return data;
            }, [stylingData, filterWeather, sortType]);

            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const handleReset = () => { setStylingData({}); setLoadedFiles([]); setFilterWeather('ALL'); setSortType('id_asc'); };

            return (
                <div className="max-w-7xl mx-auto p-6">
                    
                    {/* ★ ローディングオーバーレイ ★ */}
                    {isLoading && (
                        <div className="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-all">
                            <div className="spinner mb-4"></div>
                            <h2 className="text-xl font-bold text-indigo-700">CSVデータを結合中...</h2>
                            <p className="text-slate-500 text-sm mt-2 font-medium">データ量が多い場合、少し時間がかかります</p>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800">スタイル分析 精度検証ツール</h1>
                            <p className="text-sm text-slate-500 mt-1">Dify出力ファイルと画像マスタCSVをまとめてドロップすると自動結合します</p>
                        </div>
                        {loadedFiles.length > 0 && (
                            <button onClick={handleReset} className="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-100 transition">
                                データをリセット
                            </button>
                        )}
                    </header>

                    {Object.keys(stylingData).length === 0 ? (
                        <div 
                            onDrop={handleDrop} 
                            onDragOver={handleDragOver} 
                            onDragLeave={handleDragLeave}
                            className={`border-4 border-dashed rounded-xl p-24 text-center transition-colors ${isDragging ? 'border-indigo-500 bg-indigo-50' : 'border-slate-300 bg-white'}`}
                        >
                            <div className="text-6xl mb-4">📄</div>
                            <h2 className="text-2xl font-bold text-slate-700 mb-2">すべてのCSVファイルをここにドロップ</h2>
                            <p className="text-slate-500">
                                irel_stylingの4ファイル ＋ 追加でもらうマスタCSVファイル<br/>
                                をまとめてドロップしてください。
                            </p>
                        </div>
                    ) : (
                        <div>
                            {/* コントロールパネル */}
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="flex flex-wrap gap-2">
                                    <button 
                                        onClick={() => setFilterWeather('ALL')}
                                        className={`px-4 py-2 rounded-full font-bold text-sm transition ${filterWeather === 'ALL' ? 'bg-indigo-600 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                    >
                                        すべて表示
                                    </button>
                                    {Object.entries(WEATHER_MAP).map(([code, info]) => (
                                        <button 
                                            key={code}
                                            onClick={() => setFilterWeather(code)}
                                            className={`px-4 py-2 rounded-full font-bold text-sm flex items-center gap-1 transition ${filterWeather === code ? 'bg-indigo-600 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                        >
                                            <span>{info.emoji}</span> {info.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="flex items-center gap-2">
                                    <span className="text-sm font-bold text-slate-500">並び替え:</span>
                                    <select 
                                        value={sortType} 
                                        onChange={(e) => setSortType(e.target.value)}
                                        className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 outline-none font-bold cursor-pointer"
                                    >
                                        <option value="id_asc">ID順 (昇順 ▲)</option>
                                        <option value="id_desc">ID順 (降順 ▼)</option>
                                        <option value="temp_desc">最高気温 (高い順 🔥)</option>
                                        <option value="temp_asc">最高気温 (低い順 ❄️)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="mb-6 text-sm text-slate-600">
                                <span className="font-bold">該当件数: </span> {processedData.length} 件
                            </div>

                            {/* カード一覧 */}
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                {processedData.map(item => (
                                    <div key={item.id} className="bg-white rounded-xl shadow-md overflow-hidden border border-slate-200 flex flex-col hover:shadow-lg transition">
                                        
                                        <div className="bg-slate-200 w-full h-96 relative flex items-center justify-center border-b border-slate-100">
                                            {item.image_url ? (
                                                <img src={item.image_url} alt="スタイリング画像" className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="text-center text-slate-400">
                                                    <span className="block text-3xl mb-2">📷</span>
                                                    <span className="text-sm font-bold">画像マスタ未読込</span>
                                                </div>
                                            )}
                                        </div>

                                        <div className="p-5 flex-1 flex flex-col">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="text-xs text-slate-400 font-mono">ID: {item.id}</span>
                                                {item.category && (
                                                    <span className="bg-indigo-50 text-indigo-700 text-xs px-2 py-1 rounded font-bold">
                                                        {item.category}
                                                    </span>
                                                )}
                                            </div>

                                            <div className="flex items-center gap-4 mb-4 pb-4 border-b border-slate-100">
                                                <div className="flex flex-wrap gap-1">
                                                    {item.weather_types && item.weather_types.length > 0 ? item.weather_types.map(w => {
                                                        const wm = WEATHER_MAP[w] || { emoji: "❓", label: `不明(${w})`, color: "bg-gray-100 text-gray-600 border-gray-200" };
                                                        return (
                                                            <span key={w} className={`flex items-center gap-1 border px-2 py-1 rounded-md ${wm.color}`}>
                                                                <span className="text-sm">{wm.emoji}</span>
                                                                <span className="text-[11px] font-bold">{wm.label}</span>
                                                            </span>
                                                        );
                                                    }) : (
                                                        <span className={`flex items-center gap-1 border px-2 py-1 rounded-md ${WEATHER_MAP["0"].color}`}>
                                                            <span className="text-sm">{WEATHER_MAP["0"].emoji}</span>
                                                            <span className="text-[11px] font-bold">{WEATHER_MAP["0"].label}</span>
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex gap-3 ml-auto shrink-0">
                                                    <div className="text-center">
                                                        <div className="text-[10px] text-red-400 font-bold uppercase">Max</div>
                                                        <div className="font-bold text-lg text-slate-700">{item.max_temp ? `${item.max_temp}℃` : '-'}</div>
                                                    </div>
                                                    <div className="text-center">
                                                        <div className="text-[10px] text-blue-400 font-bold uppercase">Min</div>
                                                        <div className="font-bold text-lg text-slate-700">{item.min_temp ? `${item.min_temp}℃` : '-'}</div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="mb-4">
                                                <div className="text-xs font-bold text-slate-400 mb-1">AI スタイルひとこと</div>
                                                <p className="text-sm text-slate-700 leading-relaxed bg-slate-50 p-3 rounded-lg border border-slate-100 font-medium">
                                                    {item.comment || '（未読込）'}
                                                </p>
                                            </div>

                                            <div className="mt-auto pt-4 border-t border-slate-100">
                                                <div className="text-xs font-bold text-slate-400 mb-1">使用アイテム</div>
                                                <p className="text-xs text-slate-600 bg-slate-50 p-2 rounded border border-dashed border-slate-200 min-h-[40px]">
                                                    {item.items ? item.items.split('\n').map((line, idx) => (
                                                        <span key={idx}>{line}<br/></span>
                                                    )) : '（未読込）'}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {processedData.length === 0 && (
                                <div className="text-center py-20 text-slate-500 font-bold">
                                    該当するスタイリングがありませんでした。
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
